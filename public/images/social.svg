<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      .bg { fill: #F5F4EC; }
      .h { font-family: 'Nunito', 'Avenir Next', sans-serif; font-weight: 900; font-size: 64px; letter-spacing: -1.6px; }
      .h-espresso { fill: #231C18; }
      .h-coral { fill: #E66756; }
      .h-soft { fill: #4A3F39; }
      .sub { font-family: 'Nunito', 'Avenir Next', sans-serif; font-size: 22px; fill: #4A3F39; font-weight: 500; }
      .beta-text { fill: #C8503F; font-family: 'Nunito', 'Avenir Next', sans-serif; font-weight: 600; font-size: 17px; }
      .label-text { font-family: 'Nunito', 'Avenir Next', sans-serif; font-weight: 800; font-size: 20px; fill: #fff; letter-spacing: -0.6px; }
      .wordmark { font-family: 'Nunito', 'Avenir Next', sans-serif; font-weight: 900; font-size: 36px; fill: #231C18; letter-spacing: -0.72px; }
      .label-meta { font-family: 'DM Mono', 'Menlo', monospace; font-size: 6.5px; fill: #fff; letter-spacing: 1.2px; opacity: 0.85; }
      .chip-bg { fill: #FFFDF6; }
      .chip-text { font-family: 'Nunito', 'Avenir Next', sans-serif; font-weight: 700; font-size: 13px; fill: #231C18; }
      .chip-meta { font-family: 'DM Mono', 'Menlo', monospace; font-size: 9px; fill: #7C6F67; }
      .chip-icon-bg-powder { fill: #B8CFE9; }
      .chip-icon-bg-wash { fill: #FBE4DF; }
      .chip-icon-bg-coral { fill: #E66756; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect class="bg" width="1200" height="630"/>

  <!-- Brand wordmark -->
  <g transform="translate(80, 90)">
    <circle cx="22" cy="22" r="22" fill="#231C18"/>
    <circle cx="22" cy="22" r="16" fill="#4A3F39"/>
    <circle cx="22" cy="22" r="10" fill="#231C18"/>
    <circle cx="22" cy="22" r="6" fill="#E66756"/>
    <circle cx="22" cy="22" r="1.6" fill="#231C18"/>
    <text x="56" y="33" class="wordmark">Sendspin</text>
  </g>

  <!-- Headline (3 lines) -->
  <text x="80" y="200" class="h h-espresso">Music in every room.</text>
  <text x="80" y="276" class="h h-coral">Art on every screen.</text>
  <text x="80" y="352" class="h h-soft">Lights on the beat.</text>

  <!-- Subtext -->
  <text x="80" y="430" class="sub">All in sync. All under your control.</text>
  <text x="80" y="462" class="sub">The open standard from the Open Home Foundation.</text>

  <!-- Vinyl on right -->
  <g transform="translate(990, 360)">
    <!-- soft drop shadow -->
    <ellipse cx="0" cy="172" rx="170" ry="12" fill="#231C18" opacity="0.10"/>
    <!-- vinyl body -->
    <circle r="170" fill="#231C18"/>
    <!-- grooves -->
    <circle r="146" fill="none" stroke="#4A3F39" stroke-width="0.7"/>
    <circle r="124" fill="none" stroke="#4A3F39" stroke-width="0.7"/>
    <circle r="102" fill="none" stroke="#4A3F39" stroke-width="0.7"/>
    <circle r="80" fill="none" stroke="#4A3F39" stroke-width="0.7"/>
    <circle r="62" fill="none" stroke="#4A3F39" stroke-width="0.7"/>
    <!-- coral label -->
    <circle r="52" fill="#E66756"/>
    <text y="-6" text-anchor="middle" class="label-text">Sendspin</text>
    <line x1="-20" y1="2" x2="20" y2="2" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
    <text y="20" text-anchor="middle" class="label-meta">SIDE A · 33⅓ RPM</text>
    <!-- spindle -->
    <circle r="3" fill="#231C18"/>
  </g>

  <!-- Room chip 1: top-left of vinyl (Living room) -->
  <g transform="translate(750, 198)">
    <rect width="170" height="50" rx="25" class="chip-bg" filter="url(#shadow)"/>
    <circle cx="25" cy="25" r="14" class="chip-icon-bg-powder"/>
    <g transform="translate(18, 18)" stroke="#231C18" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="1.5" width="8" height="11" rx="1.2"/>
      <circle cx="7" cy="8" r="2.2"/>
      <circle cx="7" cy="3.8" r="0.5" fill="#231C18"/>
    </g>
    <text x="46" y="22" class="chip-text">Living room</text>
    <text x="46" y="38" class="chip-meta">FLAC · 24/96</text>
  </g>

  <!-- Room chip 2: top-right of vinyl (Kitchen display) -->
  <g transform="translate(1010, 252)">
    <rect width="170" height="50" rx="25" class="chip-bg" filter="url(#shadow)"/>
    <circle cx="25" cy="25" r="14" class="chip-icon-bg-powder"/>
    <g transform="translate(18, 18)" stroke="#231C18" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="1.5" y="3" width="11" height="7.5" rx="1"/>
      <line x1="5" y1="13" x2="9" y2="13"/>
      <line x1="7" y1="11" x2="7" y2="13"/>
    </g>
    <text x="46" y="22" class="chip-text">Kitchen display</text>
    <text x="46" y="38" class="chip-meta">Now playing</text>
  </g>

  <!-- Room chip 3: bottom-left of vinyl (Hallway lights) -->
  <g transform="translate(720, 472)">
    <rect width="170" height="50" rx="25" fill="#E7EADD" filter="url(#shadow)"/>
    <circle cx="25" cy="25" r="14" class="chip-icon-bg-wash"/>
    <g transform="translate(18, 18)" stroke="#C8503F" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="4.5" y1="11" x2="9.5" y2="11"/>
      <line x1="5.5" y1="13" x2="8.5" y2="13"/>
      <path d="M7 1.5a4 4 0 0 0-2.6 7c.5.4.6 1 .6 1.5V11h4V10c0-.5.2-1.1.6-1.5A4 4 0 0 0 7 1.5z"/>
    </g>
    <text x="46" y="22" class="chip-text">Hallway lights</text>
    <text x="46" y="38" class="chip-meta">On the beat</text>
  </g>

  <!-- Room chip 4: bottom-right of vinyl (Any phone) -->
  <g transform="translate(1010, 514)">
    <rect width="170" height="50" rx="25" class="chip-bg" filter="url(#shadow)"/>
    <circle cx="25" cy="25" r="14" class="chip-icon-bg-coral"/>
    <g transform="translate(18, 18)" stroke="#fff" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="1.5" width="8" height="11" rx="1.6"/>
      <circle cx="7" cy="5.5" r="0.5" fill="#fff"/>
      <line x1="5" y1="8.5" x2="9" y2="8.5"/>
      <line x1="5" y1="10.5" x2="9" y2="10.5"/>
    </g>
    <text x="46" y="22" class="chip-text">Any phone</text>
    <text x="46" y="38" class="chip-meta">Skip · Pause · Queue</text>
  </g>
</svg>
